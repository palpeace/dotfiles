[tools]
# 用途ごとに並べる。取得元 (aqua:/npm:/go:) は実装都合で、並び順の基準にはしない。
# グローバルに置くのは「どのプロジェクトでも使う or エディタが PATH 参照する」ツールだけ。
# プロジェクト固有のツール (bacon 等) は各 PJ の mise.toml で管理する。

# --- 1. ランタイム ---
# npm:/cargo: バックエンドの前提。setup-system で先にインストールされる。
rust = "stable"
go = "1.24"
node = "lts"
python = "3.12"

# --- 2. Shell / Navigation ---
"aqua:rossmacarthur/sheldon" = "latest"  # Zsh プラグイン管理
starship = "latest"   # プロンプト
atuin = "latest"      # シェル履歴の検索と同期
zoxide = "latest"     # ディレクトリ移動
fzf = "latest"        # インタラクティブ検索
"aqua:tldr-pages/tlrc" = "latest"  # tldr の高速参照

# --- 3. Core CLI ---
ripgrep = "latest"    # テキスト検索
"aqua:sharkdp/fd" = "latest"  # ファイル検索
bat = "latest"        # 構文ハイライト付き pager
eza = "latest"        # ls 代替
jq = "latest"         # JSON 処理
"npm:trash-cli" = "latest"  # 削除をゴミ箱経由にする

# --- 4. Git ---
github-cli = "latest"  # GitHub 操作
lazygit = "latest"     # Git TUI
delta = "latest"       # diff の見やすさ改善

# --- 5. Package Managers / Task Runner ---
uv = "latest"          # Python パッケージ管理
"npm:pnpm" = "latest"  # Node パッケージ管理
just = "latest"        # プロジェクトごとの定型コマンド実行

# --- 6. Test ---
"aqua:nextest-rs/nextest/cargo-nextest" = "latest"  # Rust テスト実行

# --- 7. Network / Containers / System ---
xh = "latest"          # HTTP クライアント
lazydocker = "latest"  # Docker TUI
bottom = "latest"      # システム監視
dust = "latest"        # ディレクトリ容量の可視化

# --- 8. Terminal Apps ---
tmux = "latest"        # ターミナル multiplexing
helix = "latest"       # ターミナルエディタ
"npm:decktape" = "latest"  # スライドの PDF 化

# --- 9. AI CLI ---
# 更新が速いツール群。必要に応じて update-system で追従する。
"npm:@openai/codex" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@github/copilot" = "latest"

# --- 10. Formatting ---
"npm:prettier" = "latest"  # 汎用 formatter
"npm:markdownlint-cli2" = "latest"  # Markdown lint
"aqua:tamasfe/taplo" = "latest"  # TOML formatter / LSP

# --- 11. LSP ---
# Zed リモートが PATH から参照するのでグローバルに置く。
"aqua:artempyanykh/marksman" = "latest"  # Markdown
"npm:pyright" = "latest"  # Python
"go:golang.org/x/tools/gopls" = "latest"  # Go

[settings]
all_compile = false
