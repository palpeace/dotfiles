set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -sg escape-time 0
set -g focus-events on
set -g detach-on-destroy off
set -g status-position top
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80
set -g status-left '#[fg=colour230,bg=colour31,bold] #S '
set -g status-right '#[fg=colour244]#H #[fg=colour250]%Y-%m-%d %H:%M '
set -g status-style 'bg=colour234,fg=colour252'
set -g message-style 'bg=colour31,fg=colour230'
set -g message-command-style 'bg=colour31,fg=colour230'
setw -g window-status-current-style 'fg=colour230,bg=colour31,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=colour244,bg=colour236'
setw -g window-status-format ' #I:#W '
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

bind-key -T prefix p switch-client -T pane-mode
bind-key -T prefix t switch-client -T tab-mode
bind-key -T prefix r switch-client -T resize-mode
bind-key -T prefix m switch-client -T move-mode
bind-key -T prefix s copy-mode \; switch-client -T scroll-mode
bind-key -T prefix o switch-client -T session-mode

bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-Left previous-window
bind-key -n M-Right next-window
bind-key -n M-+ resize-pane -Z
bind-key -n M-- resize-pane -Z
bind-key -n M-n split-window -c '#{pane_current_path}'
bind-key -n M-f display-popup -E -d '#{pane_current_path}'
bind-key -n M-p setw synchronize-panes

bind-key -T pane-mode Left select-pane -L \; switch-client -T pane-mode
bind-key -T pane-mode Down select-pane -D \; switch-client -T pane-mode
bind-key -T pane-mode Up select-pane -U \; switch-client -T pane-mode
bind-key -T pane-mode Right select-pane -R \; switch-client -T pane-mode
bind-key -T pane-mode h select-pane -L \; switch-client -T pane-mode
bind-key -T pane-mode j select-pane -D \; switch-client -T pane-mode
bind-key -T pane-mode k select-pane -U \; switch-client -T pane-mode
bind-key -T pane-mode l select-pane -R \; switch-client -T pane-mode
bind-key -T pane-mode Tab last-pane \; switch-client -T pane-mode
bind-key -T pane-mode c command-prompt -I '#{pane_title}' -p 'Rename pane:' "select-pane -T '%%'" \; switch-client -T root
bind-key -T pane-mode d split-window -v -c '#{pane_current_path}' \; switch-client -T root
bind-key -T pane-mode e display-popup -E -d '#{pane_current_path}' \; switch-client -T root
bind-key -T pane-mode f resize-pane -Z \; switch-client -T root
bind-key -T pane-mode i setw synchronize-panes \; switch-client -T root
bind-key -T pane-mode n split-window -c '#{pane_current_path}' \; switch-client -T root
bind-key -T pane-mode p switch-client -T root
bind-key -T pane-mode r split-window -h -c '#{pane_current_path}' \; switch-client -T root
bind-key -T pane-mode s split-window -v -c '#{pane_current_path}' \; select-layout even-vertical \; switch-client -T root
bind-key -T pane-mode w display-popup -E -d '#{pane_current_path}' \; switch-client -T root
bind-key -T pane-mode x kill-pane \; switch-client -T root
bind-key -T pane-mode z if -F '#{==:#{pane-border-lines},none}' 'set -g pane-border-lines single' 'set -g pane-border-lines none' \; switch-client -T root
bind-key -T pane-mode Enter switch-client -T root
bind-key -T pane-mode Escape switch-client -T root

bind-key -T tab-mode Left previous-window \; switch-client -T tab-mode
bind-key -T tab-mode Down next-window \; switch-client -T tab-mode
bind-key -T tab-mode Up previous-window \; switch-client -T tab-mode
bind-key -T tab-mode Right next-window \; switch-client -T tab-mode
bind-key -T tab-mode h previous-window \; switch-client -T tab-mode
bind-key -T tab-mode j next-window \; switch-client -T tab-mode
bind-key -T tab-mode k previous-window \; switch-client -T tab-mode
bind-key -T tab-mode l next-window \; switch-client -T tab-mode
bind-key -T tab-mode Tab last-window \; switch-client -T tab-mode
bind-key -T tab-mode 1 select-window -t :=1 \; switch-client -T root
bind-key -T tab-mode 2 select-window -t :=2 \; switch-client -T root
bind-key -T tab-mode 3 select-window -t :=3 \; switch-client -T root
bind-key -T tab-mode 4 select-window -t :=4 \; switch-client -T root
bind-key -T tab-mode 5 select-window -t :=5 \; switch-client -T root
bind-key -T tab-mode 6 select-window -t :=6 \; switch-client -T root
bind-key -T tab-mode 7 select-window -t :=7 \; switch-client -T root
bind-key -T tab-mode 8 select-window -t :=8 \; switch-client -T root
bind-key -T tab-mode 9 select-window -t :=9 \; switch-client -T root
bind-key -T tab-mode '[' swap-window -d -t -1 \; switch-client -T root
bind-key -T tab-mode ']' swap-window -d -t +1 \; switch-client -T root
bind-key -T tab-mode b break-pane \; switch-client -T root
bind-key -T tab-mode n new-window -c '#{pane_current_path}' \; switch-client -T root
bind-key -T tab-mode r command-prompt -I '#W' -p 'Rename window:' "rename-window -- '%%'" \; switch-client -T root
bind-key -T tab-mode s setw synchronize-panes \; switch-client -T root
bind-key -T tab-mode t switch-client -T root
bind-key -T tab-mode x kill-window \; switch-client -T root
bind-key -T tab-mode Enter switch-client -T root
bind-key -T tab-mode Escape switch-client -T root

bind-key -T resize-mode Left resize-pane -L 5 \; switch-client -T resize-mode
bind-key -T resize-mode Down resize-pane -D 5 \; switch-client -T resize-mode
bind-key -T resize-mode Up resize-pane -U 5 \; switch-client -T resize-mode
bind-key -T resize-mode Right resize-pane -R 5 \; switch-client -T resize-mode
bind-key -T resize-mode h resize-pane -L 5 \; switch-client -T resize-mode
bind-key -T resize-mode j resize-pane -D 5 \; switch-client -T resize-mode
bind-key -T resize-mode k resize-pane -U 5 \; switch-client -T resize-mode
bind-key -T resize-mode l resize-pane -R 5 \; switch-client -T resize-mode
bind-key -T resize-mode H resize-pane -L 1 \; switch-client -T resize-mode
bind-key -T resize-mode J resize-pane -D 1 \; switch-client -T resize-mode
bind-key -T resize-mode K resize-pane -U 1 \; switch-client -T resize-mode
bind-key -T resize-mode L resize-pane -R 1 \; switch-client -T resize-mode
bind-key -T resize-mode + resize-pane -Z \; switch-client -T root
bind-key -T resize-mode = resize-pane -Z \; switch-client -T root
bind-key -T resize-mode - resize-pane -Z \; switch-client -T root
bind-key -T resize-mode r switch-client -T root
bind-key -T resize-mode Enter switch-client -T root
bind-key -T resize-mode Escape switch-client -T root

bind-key -T move-mode Left swap-pane -s '{left-of}' \; switch-client -T move-mode
bind-key -T move-mode Down swap-pane -s '{down-of}' \; switch-client -T move-mode
bind-key -T move-mode Up swap-pane -s '{up-of}' \; switch-client -T move-mode
bind-key -T move-mode Right swap-pane -s '{right-of}' \; switch-client -T move-mode
bind-key -T move-mode h swap-pane -s '{left-of}' \; switch-client -T move-mode
bind-key -T move-mode j swap-pane -s '{down-of}' \; switch-client -T move-mode
bind-key -T move-mode k swap-pane -s '{up-of}' \; switch-client -T move-mode
bind-key -T move-mode l swap-pane -s '{right-of}' \; switch-client -T move-mode
bind-key -T move-mode m switch-client -T root
bind-key -T move-mode n break-pane \; switch-client -T root
bind-key -T move-mode p join-pane -s '{last}' \; switch-client -T root
bind-key -T move-mode Tab rotate-window \; switch-client -T move-mode
bind-key -T move-mode Enter switch-client -T root
bind-key -T move-mode Escape switch-client -T root

bind-key -T scroll-mode PageUp send-keys -X page-up \; switch-client -T scroll-mode
bind-key -T scroll-mode PageDown send-keys -X page-down \; switch-client -T scroll-mode
bind-key -T scroll-mode Left send-keys -X page-up \; switch-client -T scroll-mode
bind-key -T scroll-mode Right send-keys -X page-down \; switch-client -T scroll-mode
bind-key -T scroll-mode Up send-keys -X scroll-up \; switch-client -T scroll-mode
bind-key -T scroll-mode Down send-keys -X scroll-down \; switch-client -T scroll-mode
bind-key -T scroll-mode h send-keys -X page-up \; switch-client -T scroll-mode
bind-key -T scroll-mode l send-keys -X page-down \; switch-client -T scroll-mode
bind-key -T scroll-mode j send-keys -X scroll-down \; switch-client -T scroll-mode
bind-key -T scroll-mode k send-keys -X scroll-up \; switch-client -T scroll-mode
bind-key -T scroll-mode d send-keys -X halfpage-down \; switch-client -T scroll-mode
bind-key -T scroll-mode u send-keys -X halfpage-up \; switch-client -T scroll-mode
bind-key -T scroll-mode C-b send-keys -X page-up \; switch-client -T scroll-mode
bind-key -T scroll-mode C-f send-keys -X page-down \; switch-client -T scroll-mode
bind-key -T scroll-mode C-c send-keys -X cancel \; switch-client -T root
bind-key -T scroll-mode e run-shell '$HOME/.local/bin/tmux-edit-scrollback "#{pane_id}"' \; switch-client -T root
bind-key -T scroll-mode f command-prompt -p 'Search down:' "send-keys -X search-forward '%%'" \; switch-client -T scroll-mode
bind-key -T scroll-mode n send-keys -X search-again \; switch-client -T scroll-mode
bind-key -T scroll-mode p send-keys -X search-reverse \; switch-client -T scroll-mode
bind-key -T scroll-mode s switch-client -T root
bind-key -T scroll-mode Enter switch-client -T root
bind-key -T scroll-mode Escape switch-client -T root

bind-key -T session-mode a display-message 'tmux: Ctrl-Space then p/t/r/m/s/o'
bind-key -T session-mode c source-file ~/.tmux.conf \; display-message 'Reloaded ~/.tmux.conf' \; switch-client -T root
bind-key -T session-mode d detach-client \; switch-client -T root
bind-key -T session-mode l next-layout \; switch-client -T root
bind-key -T session-mode o switch-client -T root
bind-key -T session-mode p choose-buffer -Z \; switch-client -T root
bind-key -T session-mode s choose-tree -Z \; switch-client -T root
bind-key -T session-mode w choose-tree -Zs \; switch-client -T root
bind-key -T session-mode Enter switch-client -T root
bind-key -T session-mode Escape switch-client -T root
