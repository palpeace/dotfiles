[tools]
# --- 1. 開発言語ランタイム (Core Runtimes) ---
# 日々の運用でズレにくい安定寄りの指定を優先する
rust = "stable"
go = "1.24"
node = "lts"
python = "3.12"

# --- 2. モダンCLI (Core Tools) ---
fzf = "latest"        # 検索
ripgrep = "latest"    # 爆速grep (rg)
bat = "latest"        # 色付きcat
eza = "latest"        # 高機能ls
zoxide = "latest"     # 爆速cd (z)
"cargo:fd-find" = "latest"  # 高機能find
jq = "latest"         # JSON処理
starship = "latest"   # プロンプト
"cargo:sheldon" = "latest"  # Zshプラグイン
atuin = "latest"      # 履歴検索・同期
"cargo:tealdeer" = "latest"  # tldrページ (実例ベースのman)
"npm:trash-cli" = "latest"  # 安全なrm (ゴミ箱に移動)

# --- 3. 開発効率・Git・ネットワーク ---
github-cli = "latest"  # PR作成やGitHub連携(gh)
lazygit = "latest"     # Git TUI
lazydocker = "latest"  # Docker TUI
delta = "latest"       # Git diffを美しく
bottom = "latest"      # リソース監視 (btm)
xh = "latest"          # 爆速APIテスト (httpieのRust版)
uv = "latest"          # 爆速Pythonパッケージ管理
just = "latest"        # プロジェクトコマンドの整理
pnpm = "latest"        # Next.js 向けパッケージ管理

# --- 4. ターミナルユーティリティ ---
helix = "latest"       # ターミナル用爆速エディタ
dust = "latest"        # ディレクトリ容量の可視化
zellij = "latest"      # 画面分割
"npm:decktape" = "latest"  # スライドPDF化

# --- 5. 4大AIエージェントツール (npm経由) ---
# 更新が速いツール群。必要に応じて `update-system` で追従する
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@openai/codex" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@github/copilot" = "latest"

# --- 6. LSP ---
"aqua:artempyanykh/marksman" = "latest"
"cargo:bacon" = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:taplo-cli" = "latest"
"npm:markdownlint-cli2" = "latest"
"npm:prettier" = "latest"
"npm:pyright" = "latest"
"go:golang.org/x/tools/gopls" = "latest"

[settings]
# ツールが見つからない時に自動インストールを促す設定
all_compile = false
